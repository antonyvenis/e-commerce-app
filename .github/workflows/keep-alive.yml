name: Keep Backend Alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Backend
        run: |
          curl https://e-commerce-app-8jg4.onrender.com/

